<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nextalk</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/mobile.css">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #18181f;
      --surface3: #1e1e28;
      --border: rgba(255,255,255,0.06);
      --accent: #7c6af7;
      --accent2: #f06292;
      --accent3: #4dd0e1;
      --text: #f0f0f8;
      --text-muted: #6b6b80;
      --text-dim: #9898a8;
      --online: #4ade80;
      --glow: rgba(124,106,247,0.15);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    body::before {
      content: '';
      position: fixed;
      top: -40%;
      left: -20%;
      width: 60%;
      height: 80%;
      background: radial-gradient(ellipse, rgba(124,106,247,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -30%;
      right: -10%;
      width: 50%;
      height: 60%;
      background: radial-gradient(ellipse, rgba(240,98,146,0.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── SIDEBAR ─────────────────────────── */
    .sidebar {
      width: 72px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 0;
      gap: 8px;
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 22px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
      margin-bottom: 16px;
      cursor: pointer;
    }

    .nav-divider { width: 32px; height: 1px; background: var(--border); margin: 8px 0; }

    .nav-btn {
      width: 44px; height: 44px;
      border-radius: 14px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      transition: all 0.2s ease;
      position: relative;
      font-family: inherit;
    }
    .nav-btn:hover { background: var(--surface3); color: var(--text); }
    .nav-btn.active {
      background: linear-gradient(135deg, rgba(124,106,247,0.2), rgba(124,106,247,0.1));
      color: var(--accent);
      box-shadow: 0 0 0 1px rgba(124,106,247,0.3);
    }

    .sidebar-bottom { margin-top: auto; display: flex; flex-direction: column; align-items: center; gap: 8px; }

    .avatar-sm {
      width: 36px; height: 36px;
      border-radius: 12px;
      border: 2px solid var(--border);
      cursor: pointer;
      transition: border-color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #fff;
      font-size: 14px;
    }
    .avatar-sm:hover { border-color: var(--accent); }

    /* ── CONVERSATIONS PANEL ───────────────────── */
    .conv-panel {
      width: 300px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 10;
      flex-shrink: 0;
      animation: slideIn 0.4s ease;
    }
    @keyframes slideIn { from { opacity:0; transform: translateX(-12px); } to { opacity:1; transform: none; } }

    .panel-header {
      padding: 24px 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .panel-title {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 14px;
      letter-spacing: -0.5px;
    }
    .panel-title span { color: var(--accent); }

    .search-box {
      position: relative;
      display: flex; align-items: center;
    }
    .search-icon {
      position: absolute;
      left: 12px;
      color: var(--text-muted);
      font-size: 14px;
    }
    .search-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 9px 12px 9px 36px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      outline: none;
      transition: all 0.2s;
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { border-color: rgba(124,106,247,0.4); background: var(--surface3); }

    /* Conv list */
    .conv-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 10px;
    }

    .section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 8px 10px 6px;
    }

    .conv-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
      margin-bottom: 2px;
    }
    .conv-item:hover { background: var(--surface2); }
    .conv-item.active {
      background: linear-gradient(135deg, rgba(124,106,247,0.12), rgba(124,106,247,0.05));
      box-shadow: inset 0 0 0 1px rgba(124,106,247,0.15);
    }
    .conv-item.active::before {
      content: '';
      position: absolute;
      left: 0; top: 50%; transform: translateY(-50%);
      width: 3px; height: 60%;
      background: var(--accent);
      border-radius: 0 3px 3px 0;
    }

    .conv-avatar {
      width: 44px; height: 44px;
      border-radius: 14px;
      flex-shrink: 0;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; font-weight: 700; color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
    }

    .conv-info { flex: 1; min-width: 0; }
    .conv-name { font-size: 13.5px; font-weight: 500; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-preview { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .conv-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
    .conv-time { font-size: 11px; color: var(--text-muted); }
    .conv-badge { min-width: 18px; height: 18px; border-radius: 9px; background: var(--accent); color: #fff; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; padding: 0 5px; }

    /* ── CHAT AREA ──────────────────────────── */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 5;
    }

    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(135deg, rgba(124,106,247,0.02), transparent);
    }

    .chat-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-title-group {
      display: flex;
      flex-direction: column;
    }

    .chat-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .chat-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg-group {
      display: flex;
      gap: 12px;
      margin-bottom: 8px;
      animation: msgIn 0.3s ease;
    }
    @keyframes msgIn { from { opacity:0; transform:translateY(12px) } to { opacity:1; transform:none } }

    .msg-group.own {
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
    }

    .msg-content {
      max-width: 65%;
      display: flex;
      flex-direction: column;
    }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.4;
    }

    .msg-group.own .msg-bubble {
      background: linear-gradient(135deg, var(--accent), #9b59b6);
      color: #fff;
      border-bottom-right-radius: 6px;
    }

    .msg-group:not(.own) .msg-bubble {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 6px;
    }

    .msg-time {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      text-align: right;
    }

    .msg-group.own .msg-time {
      text-align: right;
    }

    /* Welcome state */
    .welcome-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      color: var(--text-muted);
    }

    .welcome-icon {
      font-size: 64px;
      opacity: 0.3;
    }

    .welcome-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-dim);
    }

    /* Input area */
    .chat-input-area {
      padding: 20px 24px;
      border-top: 1px solid var(--border);
      background: linear-gradient(180deg, transparent, rgba(124,106,247,0.02));
    }

    .input-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .input-box {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 11px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      resize: none;
      max-height: 120px;
      transition: all 0.2s;
    }

    .input-box:focus {
      border-color: rgba(124,106,247,0.4);
      background: var(--surface3);
    }

    .input-box::placeholder {
      color: var(--text-muted);
    }

    .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .send-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(124,106,247,0.3);
    }

    .send-btn:active {
      transform: scale(0.95);
    }

    /* Auth screen */
    #auth-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      animation: slideUp 0.4s ease;
    }

    @keyframes slideUp { from { opacity:0; transform:translateY(20px) } to { opacity:1; transform:none } }

    .auth-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      letter-spacing: -1px;
    }

    .auth-sub {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 28px;
    }

    .auth-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      background: var(--surface2);
      border-radius: 12px;
      padding: 4px;
    }

    .auth-tab {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 10px;
      transition: all 0.2s;
    }

    .auth-tab.active {
      background: var(--accent);
      color: #fff;
    }

    .auth-field {
      margin-bottom: 16px;
    }

    .auth-field label {
      display: block;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .auth-field input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }

    .auth-field input:focus {
      border-color: rgba(124,106,247,0.4);
      background: var(--surface3);
    }

    .auth-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .auth-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(124,106,247,0.3);
    }

    .auth-error {
      color: var(--accent2);
      font-size: 13px;
      margin-top: 12px;
      padding: 10px 12px;
      background: rgba(240,98,146,0.1);
      border: 1px solid rgba(240,98,146,0.2);
      border-radius: 12px;
      display: none;
    }

    @media (max-width: 768px) {
      .conv-panel { width: 100%; }
      .chat-container { display: none; }
      .chat-container.mobile-show { display: flex; width: 100%; }
    }
  </style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">N</div>
    <div class="auth-sub">Welcome to Nextalk</div>
    
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login-btn" onclick="switchTab('login')">Login</button>
      <button class="auth-tab" id="tab-signup-btn" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Login Form -->
    <div id="login-form">
      <div class="auth-field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div class="auth-field">
        <label>Password</label>
        <input type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="auth-btn" onclick="doLogin()">Sign In</button>
    </div>

    <!-- Signup Form -->
    <div id="signup-form" style="display:none">
      <div class="auth-field">
        <label>Name</label>
        <input type="text" id="reg-name" placeholder="Your name" onkeydown="if(event.key==='Enter')doRegister()">
      </div>
      <div class="auth-field">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')doRegister()">
      </div>
      <div class="auth-field">
        <label>Password</label>
        <input type="password" id="reg-pass" placeholder="Min 6 chars" onkeydown="if(event.key==='Enter')doRegister()">
      </div>
      <button class="auth-btn" onclick="doRegister()">Create Account</button>
    </div>

    <div class="auth-error" id="auth-err"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none;flex:1;display:flex;height:100vh">

  <!-- LEFT SIDEBAR -->
  <div class="sidebar">
    <div class="logo">N</div>
    <div class="nav-divider"></div>
    <button class="nav-btn active" title="Chats">💬</button>
    <button class="nav-btn" title="Calls">📞</button>
    <button class="nav-btn" title="Notifications">🔔</button>
    <div class="nav-divider"></div>
    <div class="sidebar-bottom">
      <button class="nav-btn" title="Settings">⚙️</button>
      <div class="avatar-sm" id="user-avatar" onclick="logout()" title="Logout">👤</div>
    </div>
  </div>

  <!-- CONVERSATIONS PANEL -->
  <div class="conv-panel">
    <div class="panel-header">
      <div class="panel-title">Chats</div>
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="search-input" placeholder="Search..." oninput="filterConversations()">
      </div>
    </div>
    <div class="conv-list" id="conv-list"></div>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-container">
    <div id="welcome-state" class="welcome-state">
      <div class="welcome-icon">💬</div>
      <div class="welcome-title">Select a conversation to start</div>
    </div>

    <div id="chat-view" style="display:none;flex:1;display:flex;flex-direction:column">
      <div class="chat-header">
        <div class="chat-header-left">
          <div id="chat-avatar" class="msg-avatar" style="width:44px;height:44px">👤</div>
          <div class="chat-title-group">
            <div class="chat-title" id="chat-title">—</div>
            <div class="chat-subtitle" id="chat-status">0 online</div>
          </div>
        </div>
      </div>

      <div class="chat-messages" id="chat-messages"></div>

      <div class="chat-input-area">
        <div class="input-row">
          <input type="text" id="msg-input" class="input-box" placeholder="Say something..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}">
          <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
const socket = io();
let myName = '';
let currentRoom = null;
let allRooms = [];
let allMessages = {};

// ── AUTH ──────────────────────────────
function switchTab(tab) {
  const loginForm = document.getElementById('login-form');
  const signupForm = document.getElementById('signup-form');
  const loginBtn = document.getElementById('tab-login-btn');
  const signupBtn = document.getElementById('tab-signup-btn');
  const err = document.getElementById('auth-err');
  
  err.style.display = 'none';

  if (tab === 'login') {
    loginForm.style.display = 'block';
    signupForm.style.display = 'none';
    loginBtn.classList.add('active');
    signupBtn.classList.remove('active');
  } else {
    loginForm.style.display = 'none';
    signupForm.style.display = 'block';
    loginBtn.classList.remove('active');
    signupBtn.classList.add('active');
  }
}

function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const err = document.getElementById('auth-err');

  if (!email || !pass) {
    err.textContent = 'Please fill in all fields!';
    err.style.display = 'block';
    return;
  }

  socket.emit('login', { email, password: pass });
}

function doRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-pass').value;
  const err = document.getElementById('auth-err');

  if (!name || !email || !pass) {
    err.textContent = 'Please fill in all fields!';
    err.style.display = 'block';
    return;
  }

  socket.emit('register', { name, email, password: pass });
}

socket.on('login-success', ({ name }) => {
  enterApp(name);
});

socket.on('register-success', ({ name }) => {
  enterApp(name);
});

socket.on('auth-error', (msg) => {
  const err = document.getElementById('auth-err');
  err.textContent = msg;
  err.style.display = 'block';
});

function enterApp(name) {
  myName = name;
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('user-avatar').textContent = getAvatarEmoji(name);
}

// ── ROOMS ──────────────────────────────
socket.on('room-list', (rooms) => {
  allRooms = rooms;
  renderConversations();
});

socket.on('new-room', (room) => {
  allRooms.push(room);
  renderConversations();
});

function renderConversations() {
  const list = document.getElementById('conv-list');
  list.innerHTML = '';
  
  allRooms.forEach(room => {
    const el = document.createElement('div');
    el.className = 'conv-item' + (room.id === currentRoom ? ' active' : '');
    el.id = 'conv-' + room.id;
    
    const preview = room.lastMsg ? room.lastMsg.name.split(' ')[0] + ': ' + room.lastMsg.text.substring(0, 30) : 'No messages';
    
    el.innerHTML = `
      <div class="msg-avatar" style="background:linear-gradient(135deg,var(--accent),var(--accent2))">${room.emoji || '💬'}</div>
      <div class="conv-info">
        <div class="conv-name">${escapeHtml(room.name)}</div>
        <div class="conv-preview">${escapeHtml(preview)}</div>
      </div>
      <div class="conv-meta">
        <div class="conv-time">${formatTime(room.lastMsg?.time || new Date().getTime())}</div>
      </div>
    `;
    
    el.onclick = () => openRoom(room);
    list.appendChild(el);
  });
}

function openRoom(room) {
  currentRoom = room.id;
  socket.emit('join-room', { roomId: room.id, userName: myName });

  document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('conv-' + room.id);
  if (el) el.classList.add('active');

  document.getElementById('welcome-state').style.display = 'none';
  document.getElementById('chat-view').style.display = 'flex';
  document.getElementById('chat-title').textContent = room.name;
  document.getElementById('chat-status').textContent = '0 online';
  document.getElementById('chat-avatar').textContent = room.emoji || '💬';
  document.getElementById('chat-messages').innerHTML = '';
  
  if (allMessages[room.id]) {
    allMessages[room.id].forEach(msg => appendMessage(msg));
  }
}

function filterConversations() {
  const query = document.getElementById('search-input').value.toLowerCase();
  const items = document.querySelectorAll('.conv-item');
  items.forEach(item => {
    const name = item.querySelector('.conv-name').textContent.toLowerCase();
    item.style.display = name.includes(query) ? '' : 'none';
  });
}

// ── MESSAGES ──────────────────────────────
socket.on('history', (msgs) => {
  const body = document.getElementById('chat-messages');
  if (!body) return;
  body.innerHTML = '';
  allMessages[currentRoom] = msgs;
  msgs.forEach(m => appendMessage(m));
  body.scrollTop = body.scrollHeight;
});

socket.on('message', (msg) => {
  if (!allMessages[currentRoom]) allMessages[currentRoom] = [];
  allMessages[currentRoom].push(msg);
  appendMessage(msg);
  const body = document.getElementById('chat-messages');
  if (body) body.scrollTop = body.scrollHeight;
});

function appendMessage(msg) {
  const body = document.getElementById('chat-messages');
  if (!body) return;

  const isMine = msg.name === myName;
  const g = document.createElement('div');
  g.className = 'msg-group' + (isMine ? ' own' : '');
  
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = getAvatarEmoji(msg.name);
  
  const content = document.createElement('div');
  content.className = 'msg-content';
  
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = msg.text;
  
  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = formatTime(msg.time) + (isMine ? ' ✓' : '');
  
  content.appendChild(bubble);
  content.appendChild(time);
  
  g.appendChild(avatar);
  g.appendChild(content);
  body.appendChild(g);
}

function sendMessage() {
  const input = document.getElementById('msg-input');
  if (!input) return;
  const text = input.value.trim();
  if (!text || !currentRoom) return;
  socket.emit('message', { text });
  input.value = '';
}

socket.on('online-count', (n) => {
  const el = document.getElementById('chat-status');
  if (el) el.textContent = n + ' online';
});

socket.on('user-joined', ({ name }) => {
  const body = document.getElementById('chat-messages');
  if (!body) return;
  const d = document.createElement('div');
  d.style.cssText = 'text-align:center;font-size:12px;color:var(--online);margin:6px 0;';
  d.textContent = name + ' joined';
  body.appendChild(d);
});

socket.on('user-left', ({ name }) => {
  const body = document.getElementById('chat-messages');
  if (!body) return;
  const d = document.createElement('div');
  d.style.cssText = 'text-align:center;font-size:12px;color:var(--text-muted);margin:6px 0;';
  d.textContent = name + ' left';
  body.appendChild(d);
});

// ── HELPERS ──────────────────────────────
function getAvatarEmoji(name = '') {
  const list = ['😀','😎','🤩','🥳','🧑','👩','👨','🦸','🧙','🤖'];
  let h = 0;
  for (let c of name) h = (h * 31 + c.charCodeAt(0)) & 0xff;
  return list[h % list.length];
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatTime(ts) {
  if (!ts) return '';
  return new Date(ts).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
}

function logout() {
  location.reload();
}
</script>

</html>
